<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TacticalPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="top-nav">
    <h1>TacticalPulse</h1>
  </div>
  
  <div class="container">
    <div class="hero-card">
      <h2 class="display-md">Live Commentary</h2>
      <p class="body-lg">Beyond Data. The story of the match, told live.</p>
    </div>

    <div class="controls">
      <button id="start-btn" class="button-primary">Start Commentary</button>
      <button id="stop-btn" class="button-secondary" disabled>Stop</button>
    </div>

    <div class="feature-card" id="status-card">
      <p class="body-emphasis">Status: <span id="status-text" class="ink-muted">Waiting to start...</span></p>
      <p class="body-emphasis" style="margin-top: 8px;">Mode: <span id="mode-text" class="ink-muted" style="color: var(--primary);">Detecting...</span></p>
    </div>

    <div class="feature-card-elevated" id="feed-container">
      <h3>Match Feed</h3>
      <div id="commentary-feed" class="feed">
        <!-- Commentary items will appear here -->
      </div>
    </div>
  </div>

  <script src="dataService.js"></script>
  <script src="script.js"></script>
</body>
</html>
